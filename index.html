<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">

  <!-- ฟ้อนต์ -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<!-- 👇 ใส่ class ตรงนี้ -->
<body class="login-page">

<div class="card login-card">
  <h2>เข้าสู่ระบบ</h2>

  <input id="studentId" placeholder="รหัสนักศึกษา"><br>
  <input id="name" placeholder="ชื่อ"><br>
  <input id="email" placeholder="อีเมล"><br>

  <button onclick="login()">เข้าสู่ระบบ</button>

  <p id="error" class="error-text"></p>
</div>

<script>
function login(){
  const id = document.getElementById("studentId").value.trim();
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!id || !name || !email){
    document.getElementById("error").innerText = "⚠️ กรุณากรอกข้อมูลให้ครบ";
    return;
  }

  localStorage.setItem("studentId", id);
  localStorage.setItem("name", name);
  localStorage.setItem("email", email);

  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
